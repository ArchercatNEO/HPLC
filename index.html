<!DOCTYPE html>
<html>
  
  <head>
    <!--
      <script language="javascript" src="plots/chartist.js"></script>
    -->
      <script language="javascript" src="scripts/analysis.js" type="module application/javascript"></script>
      <script language="javascript" src="scripts/chart.js" type="module application/javascript"></script>
    
      <script language="javascript" src="dist/bundle.js" type="application/javascript"></script>
      <link href="plots/chartist.css" rel="stylesheet" type="text/css">
      <link href="styles/styles.css" rel="stylesheet" type="text/css">
  </head>	

  <body>
    <form id="form" onsubmit="Submit()">
      <label for="slider">Select a Value:</label>
      <input type="range" id="slider" name="slider" min="0.01" max="1" step="0.01">
      <output for="slider" id="sliderValue">50</output>
      <input type="file" id="fileInput" onchange="Submit()">
      <input type="text" id="noiseInput" onchange="Submit()">
      <input type="button" value="Send File" onclick="Submit()">
    </form>
    
    <p id="yes"> Deberia haber texto </p>
    <div id="my-chart"> </div>
    <script>
      const slider = document.getElementById("slider");
      const sliderValue = document.getElementById("sliderValue");
      const noise = document.getElementById("noiseInput");
      const files = document.getElementById("fileInput");

      const reader = new FileReader();
      reader.onload = (event) => Server.Process(event, parseFloat(noise));

      slider.addEventListener("input", () => {
        sliderValue.textContent = slider.value * noise.value;
        Submit();
      });

      function Submit() {
        Server.ProcessFile(files.files, reader, noise.value);
      }
    </script>
    <p id="heya"></p>
  </body>

</html>
